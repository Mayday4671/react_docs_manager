- apiName: "查询区域列表"
  description: "根据查询条件查询区域列表信息，主要用于区域信息查询过滤。\n"
  apiGroupInfo:
    groupId: 1631494539766136832
  apiProviderInfo:
    pId: 6
  protocol: "HTTPS"
  path: "/api/irds/v1/region/nodesByParams"
  httpMethod: "POST"
  authenticationMode: "1"
  backendServiceType: "HTTP"
  backendurl: "/irds/api/v1/region/nodesByParams"
  backendHttpMethod: "POST"
  backendTimeout: 10000
  inParms:
  - oder: 0
    paramName: "userId"
    paramPos: "Head"
    paramType: "String"
    nullable: true
    defaultValue: "#userId#"
    demo: "userId"
    description: "userId"
    backendParam:
      beParmName: "userId"
      beParmPos: "Head"
  - paramName: "body"
    paramPos: "Body"
    paramType: "application/json"
    nullable: true
    model:
      name: "Object"
      type: "Object"
      required: true
      example: ""
      description: ""
      hidden: false
      constantValue: ""
      children:
      - name: "resourceType"
        type: "String"
        required: true
        example: "camera"
        description: "资源类型权限码集合，详见[附录A.3 资源类型/资源权限码]@[软件产品-融合通信应用平台-附录-附录A 数据字典#附录\
          A.3 资源类型/资源权限码]，\n查询资源的类型，传region时查询的为用户有配置权限的区域树，传资源类型如：camera、encodeDevice查\
          询用户对该类资源有权限的区域树；\n注：资源iasDevice\\reader\\floor不进行权限校验，即不传authCodes"
        hidden: false
        mappingName: "resourceType"
        mappingPosition: "Body"
      - name: "parentIndexCodes"
        type: "Array"
        required: false
        example: ""
        description: "父编号集合;\nString[]；\n父编号个数\n<=1000个；\n单个长度<=64Byte；"
        hidden: false
        mappingName: "parentIndexCodes"
        constantValue: ""
      - name: "pageNo"
        type: "Number"
        required: true
        example: "1"
        description: "当前页码；pageNo≥1"
        hidden: false
        mappingName: "pageNo"
        mappingPosition: "Body"
      - name: "pageSize"
        type: "Number"
        required: true
        example: "1"
        description: "分页大小；0<pageSize≤1000"
        hidden: false
        mappingName: "pageSize"
        mappingPosition: "Body"
      - name: "regionType"
        type: "Number"
        required: false
        example: "2"
        description: "区域类型，\n0 普通区域，\n1 级联区域，\n2 楼栋单元"
        hidden: false
        mappingName: "regionType"
        mappingPosition: "Body"
      - name: "regionName"
        type: "String"
        required: false
        example: "区"
        description: "区域名称；根据区域名称过滤，可模糊查询；\n若包含中文，最大长度40，最大长度指不超过按照指定编码的字节长度，即getBytes(\"\
          utf-8\").length"
        hidden: false
        mappingName: "regionName"
        mappingPosition: "Body"
      - name: "authCodes"
        type: "Array"
        required: false
        example: ""
        description: "权限码集合，详见[附录A.3 资源类型/资源权限码]@[软件产品-融合通信应用平台-附录-附录A 数据字典#附录A.3\
          \ 资源类型/资源权限码]，\n权限码个数\n<=20个；\n单个权限码长度\n<=40Byte；\n只有同时指定userId、authCodes时\
          ，才进行权限过滤；\n当指定多个权限码时，只返回同时具有这些权限码的区域；\n"
        hidden: false
        mappingName: "authCodes"
        constantValue: ""
      - name: "sonOrgIndexCodes"
        type: "Array"
        required: false
        example: ""
        description: "本级区域向上查询;\nString[];场景：通过名称模糊查询资源点获取区域编号，并组成资源点的树形结构；\n本级区域个\
          数\n<=10个；\n单个长度<=64Byte；\nsonOrgIndexCodes集合中的多个区域只能为同一级目录； \n当parentIndexCodes、\
          regionType、regionName都为空时，才可根据sonOrgIndexCodes查询；\n"
        hidden: false
        mappingName: "sonOrgIndexCodes"
        constantValue: ""
    demo: "{ \n    \"parentIndexCodes\": [ \n        \"root000000\"\n    ], \n   \
      \ \"regionType\": 2, \n    \"pageNo\": 1, \n    \"regionName\": \"区\", \n  \
      \  \"authCodes\": [ \n        \"view\"\n    ], \n    \"pageSize\": 1,\n    \"\
      resourceType\": \"camera\"\n}\n"
    description: ""
    backendParam:
      beParmName: "body"
      beParmPos: "Body"
